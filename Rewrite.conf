# ====================分割线====================


hostname = tieba.baidu.com, djcapp.game.qq.com, www.zhihu.com,   api.bilibili.com, api.m.jd.com, trade-acs.m.taobao.com,amdc.m.taobao.com,   *.my10api.com, license.pdfexpert.com, vip1.kuwo.cn,musicpay.kuwo.cn, education.github.com, *.*apps.com,*.xiao*.com, getuserinfo-globalapi.zymk.cn


# ====================分割线====================


# QX远程引用Js添加ID  
# ^https:\/\/(raw.githubusercontent|\w+\.github)\.(com|io)\/.*\.js$ url script-response-body JS/qx.id.js


# ====================分割线====================


# 百度
^https?:\/\/tieba\.baidu\.com url request-header (\r\n)User-Agent:.+(\r\n) request-header $1User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_3) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/80.0.3987.132 Safari/537.36$2

# 腾讯.道聚城 屏蔽升级 @shaungfan
https:\/\/djcapp\.game\.qq\.com\/[0-9a-zA-z\/]+version\? url response-body "data":\{.+\},"eventid" response-body "data":{"version":"1"},"eventid"

# 知乎
^https?://www\.zhihu\.com url request-header (\r\n)User-Agent:.+(\r\n) request-header $1User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_3) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/80.0.3987.132 Safari/537.36$2


